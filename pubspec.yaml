name: college_and_career_checklist
description: A shared checklist app with per-user completion using Supabase.
version: 1.0.0+4
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase (auth + database)
  supabase_flutter: ^2.0.0

  # Open URLs in the phone browser
  url_launcher: ^6.3.0

  # Persist saved login email
  shared_preferences: ^2.2.2

  # Standard Flutter icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
